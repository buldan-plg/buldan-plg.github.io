    <link rel="icon" href="dist/img/child.jpeg" type="image/jpeg" />

  <body>
    <nav>
      <div class="nav-logo">BMP</div>
      <ul class="nav-links">

      <button class="nav-cta">Let's Talk</button>

    <section id="home">
      <div class="hero-blob"></div>
      <div class="hero-content fade-up visible">
        <p class="hero-eyebrow">I am Buldan</p>
        <h1 class="hero-title">Junior<br />Intern<br />Web dev</h1>

          Blending thoughtful UI design with clean, responsive development to

        </p>
        <div class="hero-actions">
          <a href="#" class="btn-primary">Download CV</a>
          <div class="social-links">
            <!-- LinkedIn -->
            <a href="#" aria-label="LinkedIn">
              <svg
                width="16"
                height="16"
                fill="currentColor"
                viewBox="0 0 24 24"
              >
                <path
                  d="M16 8a6 6 0 0 1 6 6v7h-4v-7a2 2 0 0 0-2-2 2 2 0 0 0-2 2v7h-4v-7a6 6 0 0 1 6-6zM2 9h4v12H2z"

            <!-- GitHub -->
            <a href="#" aria-label="GitHub">

                width="16"
                height="16"
                fill="currentColor"
                viewBox="0 0 24 24"

        </div>

      <!-- Decorative image area -->
      <div class="hero-image">
        <div class="hero-image-placeholder">
          <svg
            class="silhouette"
            viewBox="0 0 200 300"
            fill="none"
            xmlns="http://www.w3.org/2000/svg"
          >
            <!-- Abstract person silhouette -->
            <ellipse cx="100" cy="55" rx="35" ry="38" fill="#2a2a2a" />
            <path
              d="M40 300 C30 220 20 180 60 150 C75 140 90 135 100 135 C110 135 125 140 140 150 C180 180 170 220 160 300Z"
              fill="#222"
            />
            <!-- Hat brim -->
            <ellipse cx="100" cy="22" rx="52" ry="10" fill="#333" />
            <!-- hat top -->
            <ellipse cx="100" cy="14" rx="36" ry="14" fill="#2d2d2d" />
            <!-- sunglasses -->
            <rect x="72" y="58" width="24" height="14" rx="7" fill="#1a1a1a" />
            <rect x="104" y="58" width="24" height="14" rx="7" fill="#1a1a1a" />
            <line
              x1="96"
              y1="65"
              x2="104"
              y2="65"
              stroke="#1a1a1a"
              stroke-width="2"
            />
          </svg>
        </div>
      </div>
